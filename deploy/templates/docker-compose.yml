version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-archon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-archonhq}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archon} -d ${POSTGRES_DB:-archonhq}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: --jetstream --http_port 8222
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring (optional: visit http://localhost:8222)
    volumes:
      - nats_data:/var/lib/nats
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ../..                # points to repo root
      dockerfile: Dockerfile.api    # we'll create this next
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-archon}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-archonhq}?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ../..:/app:cached           # live code reload during dev (optional)
    command: go run ./cmd/api/main.go   # or ./cmd/api after build

volumes:
  postgres_data:
  nats_data:
