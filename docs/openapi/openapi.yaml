openapi: 3.1.0
info:
  title: ArchonHQ API
  version: 1.0.0
servers:
  - url: https://api.example.com
components:
  securitySchemes:
    clerkBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    nodeBearer:
      type: http
      scheme: bearer
      bearerFormat: NodeToken
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
    ScenarioId:
      in: path
      name: scenario_id
      required: true
      schema:
        type: string
    RunId:
      in: path
      name: run_id
      required: true
      schema:
        type: string
    BaselineId:
      in: path
      name: baseline_id
      required: true
      schema:
        type: string
    ReplayId:
      in: path
      name: replay_id
      required: true
      schema:
        type: string
    TemplateId:
      in: path
      name: template_id
      required: true
      schema:
        type: string
    CriticId:
      in: path
      name: critic_id
      required: true
      schema:
        type: string
    ValidationRunId:
      in: path
      name: validation_run_id
      required: true
      schema:
        type: string
    Limit:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
  schemas:
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            correlation_id:
              type: string
    TaskSpec:
      type: object
      required:
        - workspace_id
        - task_family
        - title
      properties:
        workspace_id:
          type: string
        task_family:
          type: string
          enum:
            - research.extract
            - doc.section.write
            - code.patch
            - verify.result
            - reduce.merge
            - autosearch.self_improve
        title:
          type: string
        description:
          type: string
        input_refs:
          type: array
          items:
            type: string
        acceptance_contract_template_id:
          type: string
        acceptance_contract_template_version:
          type: integer
        validation_tier:
          type: string
          enum:
            - fast
            - standard
            - high_assurance
        acceptance_contract:
          type: object
          additionalProperties: true
    ResultClaim:
      type: object
      required:
        - result_id
        - task_id
        - lease_id
      properties:
        result_id:
          type: string
        task_id:
          type: string
        lease_id:
          type: string
        output_refs:
          type: array
          items:
            type: string
    DecomposeTaskRequest:
      type: object
      properties:
        merge_strategy:
          type: string
        max_children:
          type: integer
          minimum: 1
          maximum: 20
        autosearch:
          type: object
          properties:
            enabled:
              type: boolean
            experiment_id:
              type: string
            max_iterations:
              type: integer
            budget_limit_jw:
              type: number
            require_approval:
              type: boolean
            approval_granted:
              type: boolean
            min_accept_score:
              type: number
            candidate_benchmark_deltas:
              type: array
              items:
                type: number
    TaskDecomposeResponse:
      type: object
      required:
        - task_id
        - task_family
        - merge_strategy
        - children
      properties:
        task_id:
          type: string
        task_family:
          type: string
        merge_strategy:
          type: string
        children:
          type: array
          items:
            type: object
            additionalProperties: true
        autosearch_preview:
          type: object
          additionalProperties: true
          nullable: true
        simulation_entrypoints:
          type: array
          items:
            type: object
            additionalProperties: true
        lineage:
          type: object
          additionalProperties: true
    ConfigureApprovalAutoModeRequest:
      type: object
      properties:
        enabled:
          type: boolean
        max_iterations:
          type: integer
        budget_limit_jw:
          type: number
        require_approval:
          type: boolean
        approval_granted:
          type: boolean
    ApprovalAutoModeResponse:
      type: object
      required:
        - approval_id
        - task_id
        - auto_mode
      properties:
        approval_id:
          type: string
        task_id:
          type: string
        status:
          type: string
        auto_mode:
          type: object
          additionalProperties: true
    CreateVerificationRequest:
      type: object
      required:
        - result_id
        - verifier_type
      properties:
        verification_id:
          type: string
        result_id:
          type: string
        verifier_type:
          type: string
        verifier_id:
          type: string
        score:
          type: number
        report:
          type: object
          additionalProperties: true
        iterative:
          type: object
          additionalProperties: true
    VerificationResponse:
      type: object
      required:
        - verification_id
        - result_id
        - verifier_type
        - decision
      properties:
        verification_id:
          type: string
        tenant_id:
          type: string
        result_id:
          type: string
        verifier_type:
          type: string
        verifier_id:
          type: string
        score:
          type: number
        decision:
          type: string
        report:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    CreateReductionRequest:
      type: object
      required:
        - task_id
        - candidates
      properties:
        reduction_id:
          type: string
        task_id:
          type: string
        strategy:
          type: string
        candidates:
          type: array
          items:
            type: object
            required:
              - result_id
              - score
            properties:
              result_id:
                type: string
              score:
                type: number
              patch_ops:
                type: array
                items:
                  type: string
              state_ref:
                type: string
              metadata:
                type: object
                additionalProperties: true
        autosearch:
          type: object
          additionalProperties: true
    ReductionResponse:
      type: object
      required:
        - reduction_id
        - task_id
        - strategy
      properties:
        reduction_id:
          type: string
        tenant_id:
          type: string
        task_id:
          type: string
        strategy:
          type: string
        status:
          type: string
        winner_result_id:
          type: string
        ranked_result_ids:
          type: array
          items:
            type: string
        merged_patch_ops:
          type: array
          items:
            type: string
        output_state_ref:
          type: string
        autosearch_preview:
          type: object
          additionalProperties: true
          nullable: true
        simulation_entrypoints:
          type: array
          items:
            type: object
            additionalProperties: true
        decision:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    TaskMarketResponse:
      type: object
      required:
        - task_id
        - task_family
        - status
      properties:
        task_id:
          type: string
        task_family:
          type: string
        status:
          type: string
        recommended_merge_strategy:
          type: string
        quote:
          type: object
          additionalProperties: true
          nullable: true
        rate_snapshot:
          type: object
          additionalProperties: true
          nullable: true
        signals:
          type: object
          additionalProperties: true
        lineage_view:
          type: object
          additionalProperties: true
        simulation_entrypoints:
          type: array
          items:
            type: object
            additionalProperties: true
    AcceptanceContractTemplate:
      type: object
      required:
        - tenant_id
        - template_id
        - task_family
        - name
        - status
      properties:
        tenant_id:
          type: string
        template_id:
          type: string
        task_family:
          type: string
        name:
          type: string
        status:
          type: string
          enum:
            - draft
            - published
            - archived
        published_version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AcceptanceContractTemplateVersion:
      type: object
      required:
        - tenant_id
        - template_id
        - version
        - contract
      properties:
        tenant_id:
          type: string
        template_id:
          type: string
        version:
          type: integer
        contract:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    Critic:
      type: object
      required:
        - tenant_id
        - critic_id
        - stage_name
        - task_family
        - critic_class
        - provider_family
        - failure_mode_class
        - enabled
        - status
      properties:
        tenant_id:
          type: string
        critic_id:
          type: string
        name:
          type: string
        stage_name:
          type: string
          enum:
            - plan
            - execution
            - artifact
            - output
            - policy
            - security
            - benchmark
            - reduction
        task_family:
          type: string
        critic_class:
          type: string
        provider_family:
          type: string
        failure_mode_class:
          type: string
        enabled:
          type: boolean
        status:
          type: string
          enum:
            - draft
            - published
            - archived
        published_version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CriticVersion:
      type: object
      required:
        - tenant_id
        - critic_id
        - version
      properties:
        tenant_id:
          type: string
        critic_id:
          type: string
        version:
          type: integer
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    ValidationStageResult:
      type: object
      required:
        - stage_order
        - stage_name
        - decision
      properties:
        stage_order:
          type: integer
        stage_name:
          type: string
        critic_id:
          type: string
        critic_class:
          type: string
        decision:
          type: string
          enum:
            - accepted
            - rejected
            - needs_review
        score:
          type: number
        evidence_refs:
          type: array
          items:
            type: string
        occurred_at:
          type: string
          format: date-time
    ValidationRun:
      type: object
      required:
        - validation_run_id
        - tenant_id
        - task_id
        - task_family
        - validation_tier
        - status
        - decision
      properties:
        validation_run_id:
          type: string
        tenant_id:
          type: string
        task_id:
          type: string
        task_family:
          type: string
        result_reference:
          type: string
        validation_tier:
          type: string
          enum:
            - fast
            - standard
            - high_assurance
        status:
          type: string
          enum:
            - completed
            - needs_review
            - rejected
            - escalated
        decision:
          type: string
          enum:
            - accepted
            - rejected
            - needs_review
        acceptance_contract:
          type: object
          additionalProperties: true
        stage_results:
          type: array
          items:
            $ref: "#/components/schemas/ValidationStageResult"
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
    SimulationScenario:
      type: object
      required:
        - scenario_id
        - scope
        - name
        - status
        - owner_id
        - created_at
      properties:
        scenario_id:
          type: string
        tenant_id:
          type: string
          nullable: true
        scope:
          type: string
          enum:
            - platform
            - tenant
        name:
          type: string
        status:
          type: string
          enum:
            - draft
            - published
            - archived
        owner_id:
          type: string
        created_at:
          type: string
          format: date-time
    SimulationScenarioVersion:
      type: object
      required:
        - scenario_version_id
        - scenario_id
        - version
        - definition_json
        - seed_strategy
        - runtime_mode_allowlist
      properties:
        scenario_version_id:
          type: string
        scenario_id:
          type: string
        version:
          type: integer
        definition_json:
          type: object
          additionalProperties: true
        seed_strategy:
          type: string
        runtime_mode_allowlist:
          type: array
          items:
            type: string
            enum:
              - deterministic_stub
              - sampled_synthetic
              - runtime_backed
        success_criteria_json:
          type: object
          additionalProperties: true
        failure_thresholds_json:
          type: object
          additionalProperties: true
        published_at:
          type: string
          format: date-time
          nullable: true
    SimulationRun:
      type: object
      required:
        - run_id
        - scenario_version_id
        - status
        - run_mode
        - seed
        - started_by
        - started_at
      properties:
        run_id:
          type: string
        tenant_id:
          type: string
          nullable: true
        scenario_version_id:
          type: string
        status:
          type: string
          enum:
            - requested
            - running
            - completed
            - failed
            - cancelled
        run_mode:
          type: string
          enum:
            - deterministic_stub
            - sampled_synthetic
            - runtime_backed
        seed:
          type: string
        started_by:
          type: string
        budget_limit_jw:
          type: number
          nullable: true
        budget_limit_usd:
          type: number
          nullable: true
        time_limit_sec:
          type: integer
          nullable: true
        candidate_policy_json:
          type: object
          additionalProperties: true
          nullable: true
        candidate_formula_json:
          type: object
          additionalProperties: true
          nullable: true
        baseline_ref:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
    SimulationRunEvent:
      type: object
      required:
        - step_id
        - run_id
        - step_index
        - event_type
        - occurred_at
      properties:
        step_id:
          type: string
        run_id:
          type: string
        step_index:
          type: integer
        event_type:
          type: string
        payload_json:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
    SimulationRunMetric:
      type: object
      required:
        - metric_id
        - run_id
        - metric_name
        - metric_value
        - captured_at
      properties:
        metric_id:
          type: string
        run_id:
          type: string
        metric_name:
          type: string
        dimension_json:
          type: object
          additionalProperties: true
        metric_value:
          type: number
        window_name:
          type: string
        captured_at:
          type: string
          format: date-time
    SimulationFinding:
      type: object
      required:
        - finding_id
        - run_id
        - finding_type
        - severity
        - summary
      properties:
        finding_id:
          type: string
        run_id:
          type: string
        finding_type:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        summary:
          type: string
        evidence_json:
          type: object
          additionalProperties: true
        recommended_action:
          type: string
    SimulationBaseline:
      type: object
      required:
        - baseline_id
        - scenario_version_id
        - baseline_name
        - promoted_from_run_id
        - created_at
      properties:
        baseline_id:
          type: string
        scenario_version_id:
          type: string
        baseline_name:
          type: string
        metric_expectations_json:
          type: object
          additionalProperties: true
        promoted_from_run_id:
          type: string
        created_at:
          type: string
          format: date-time
    SimulationReplay:
      type: object
      required:
        - replay_id
        - status
        - source_run_id
        - scenario_version_id
        - requested_by
        - created_at
      properties:
        replay_id:
          type: string
        status:
          type: string
          enum:
            - requested
            - approved
            - running
            - completed
            - denied
            - failed
        source_run_id:
          type: string
        scenario_version_id:
          type: string
        requested_by:
          type: string
        created_at:
          type: string
          format: date-time
    CreateSimulationScenarioRequest:
      type: object
      required:
        - scope
        - name
      properties:
        scope:
          type: string
          enum:
            - platform
            - tenant
        name:
          type: string
        description:
          type: string
    CreateSimulationScenarioVersionRequest:
      type: object
      required:
        - definition_json
        - seed_strategy
        - runtime_mode_allowlist
      properties:
        definition_json:
          type: object
          additionalProperties: true
        seed_strategy:
          type: string
        runtime_mode_allowlist:
          type: array
          items:
            type: string
            enum:
              - deterministic_stub
              - sampled_synthetic
              - runtime_backed
        success_criteria_json:
          type: object
          additionalProperties: true
        failure_thresholds_json:
          type: object
          additionalProperties: true
    PublishSimulationScenarioRequest:
      type: object
      properties:
        scenario_version_id:
          type: string
      required:
        - scenario_version_id
    StartSimulationRunRequest:
      type: object
      required:
        - scenario_version_id
        - run_mode
      properties:
        scenario_version_id:
          type: string
        run_mode:
          type: string
          enum:
            - deterministic_stub
            - sampled_synthetic
            - runtime_backed
        seed:
          type: string
        budget_limit_jw:
          type: number
        budget_limit_usd:
          type: number
        time_limit_sec:
          type: integer
        candidate_policy_json:
          type: object
          additionalProperties: true
        candidate_formula_json:
          type: object
          additionalProperties: true
        baseline_ref:
          type: string
    PromoteSimulationBaselineRequest:
      type: object
      required:
        - baseline_name
      properties:
        baseline_name:
          type: string
        metric_expectations_json:
          type: object
          additionalProperties: true
    CompareSimulationRequest:
      type: object
      required:
        - candidate_run_id
      properties:
        candidate_run_id:
          type: string
        baseline_id:
          type: string
        scenario_version_id:
          type: string
    CompareSimulationResponse:
      type: object
      required:
        - verdict
        - deltas
      properties:
        verdict:
          type: string
          enum:
            - promote
            - promote_with_guardrails
            - hold_for_review
            - reject
        deltas:
          type: array
          items:
            type: object
            required:
              - metric_name
              - candidate
              - baseline
              - delta
              - threshold_status
            properties:
              metric_name:
                type: string
              candidate:
                type: number
              baseline:
                type: number
              delta:
                type: number
              threshold_status:
                type: string
                enum:
                  - pass
                  - warn
                  - fail
    RequestSimulationReplayRequest:
      type: object
      required:
        - source_run_id
      properties:
        source_run_id:
          type: string
        scenario_version_id:
          type: string
        reason:
          type: string
        sensitive_source:
          type: boolean
          default: false
    CreatePaperclipSyncRequest:
      type: object
      properties:
        sync_id:
          type: string
        dry_run:
          type: boolean
          default: false
        force:
          type: boolean
          default: false
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
    PaperclipSyncResponse:
      type: object
      required:
        - sync_id
        - status
        - source_of_truth
      properties:
        sync_id:
          type: string
        status:
          type: string
          enum:
            - requested
            - completed
            - dry_run
            - failed
        external_ref:
          type: string
        source_of_truth:
          type: string
          enum:
            - postgres
        paperclip_authoritative:
          type: boolean
        surface_counts:
          type: object
          additionalProperties:
            type: integer
        generated_at:
          type: string
          format: date-time
    PaperclipStatusResponse:
      type: object
      required:
        - integration
        - status
        - source_of_truth
      properties:
        integration:
          type: string
          enum:
            - paperclip
        status:
          type: string
        last_event_id:
          type: string
        last_event_type:
          type: string
        last_sync_id:
          type: string
        last_external_ref:
          type: string
        last_surface_counts:
          type: object
          additionalProperties:
            type: integer
        last_error:
          type: string
        last_sync_at:
          type: string
          format: date-time
        source_of_truth:
          type: string
          enum:
            - postgres
        paperclip_authoritative:
          type: boolean
paths:
  /v1/tasks:
    post:
      security:
        - clerkBearer: []
      summary: Create task
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskSpec"
      responses:
        "200":
          description: Task created
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/results:
    post:
      security:
        - nodeBearer: []
      summary: Submit result
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResultClaim"
      responses:
        "200":
          description: Result accepted for processing
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/tasks/{task_id}/decompose:
    post:
      security:
        - clerkBearer: []
      summary: Decompose task into advanced workload shards
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecomposeTaskRequest"
      responses:
        "200":
          description: Decomposition completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDecomposeResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/approvals/{approval_id}/auto-mode:
    post:
      security:
        - clerkBearer: []
      summary: Configure approval auto-mode guardrails
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - in: path
          name: approval_id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigureApprovalAutoModeRequest"
      responses:
        "200":
          description: Auto-mode configuration persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalAutoModeResponse"
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /v1/verifications:
    post:
      security:
        - clerkBearer: []
      summary: Create verification with evaluator/verifier hooks
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVerificationRequest"
      responses:
