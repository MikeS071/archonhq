# Kamal 2 deploy config — archonhq.ai
# No kamal-proxy; Traefik (coolify-proxy) handles routing via Docker labels.
# Traefik is on "coolify" network with unless-stopped restart — runs independently.

service: archonhq
image: ghcr.io/mikes071/mission-control

servers:
  web:
    hosts:
      - 152.42.181.111
    labels:
      traefik.enable: "true"
      traefik.http.middlewares.gzip.compress: "true"
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: "https"
      traefik.http.routers.http-archonhq.entryPoints: "http"
      traefik.http.routers.http-archonhq.middlewares: "redirect-to-https"
      traefik.http.routers.http-archonhq.rule: "Host(`archonhq.ai`) && PathPrefix(`/`)"
      traefik.http.routers.http-archonhq.service: "http-archonhq"
      traefik.http.routers.https-archonhq.entryPoints: "https"
      traefik.http.routers.https-archonhq.middlewares: "gzip"
      traefik.http.routers.https-archonhq.rule: "Host(`archonhq.ai`) && PathPrefix(`/`)"
      traefik.http.routers.https-archonhq.service: "https-archonhq"
      traefik.http.routers.https-archonhq.tls: "true"
      traefik.http.routers.https-archonhq.tls.certresolver: "letsencrypt"
      traefik.http.services.http-archonhq.loadbalancer.server.port: "3000"
      traefik.http.services.https-archonhq.loadbalancer.server.port: "3000"
    options:
      network: "coolify"
      publish:
        - "3002:3000"

registry:
  server: ghcr.io
  username: mikes071
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    NEXTAUTH_URL: https://archonhq.ai
    AIPIPE_URL: http://127.0.0.1:8082
    GATEWAY_URL: http://127.0.0.1:18789
    WORKSPACE_PATH: /home/openclaw/.openclaw/workspace
    NODE_OPTIONS: --max-old-space-size=2048
    NODE_ENV: production
  secret:
    - DATABASE_URL
    - NEXTAUTH_SECRET
    - AIPIPE_ADMIN_SECRET
    - API_SECRET
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - STRIPE_PRO_PRICE_ID
    - STRIPE_TEAM_PRICE_ID
    - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    - RESEND_API_KEY
    - ANTHROPIC_API_KEY
    - TELEGRAM_BOT_TOKEN
    - TELEGRAM_CHAT_ID

healthcheck:
  path: /api/health
  port: 3000
  max_attempts: 15
  interval: 5s

ssh:
  user: openclaw
  keys:
    - ~/.ssh/kamal_deploy

# No proxy: block — Traefik handles routing, not kamal-proxy
