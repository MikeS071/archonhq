version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openclaw
      POSTGRES_DB: mission_control
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Allows the container to reach the OpenClaw gateway on the host (127.0.0.1:18789)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL:          postgresql://openclaw@db/mission_control
      NEXTAUTH_URL:          ${NEXTAUTH_URL}
      NEXTAUTH_SECRET:       ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET}
      API_SECRET:            ${API_SECRET}
      GATEWAY_URL:           ${GATEWAY_URL:-http://host.docker.internal:18789}
      WORKSPACE_PATH:        ${WORKSPACE_PATH:-/workspace}
      TELEGRAM_BOT_TOKEN:    ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID:      ${TELEGRAM_CHAT_ID:-}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount the OpenClaw workspace for file operations (optional, Archon tier)
      - ${WORKSPACE_PATH:-/tmp/workspace}:/workspace:ro

volumes:
  pgdata:
